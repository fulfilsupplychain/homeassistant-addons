views:
  - title: Overview
    path: overview
    icon: mdi:monitor-dashboard
    cards:
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.system_monitor_cpu_usage
            name: CPU
            severity:
              green: 0
              yellow: 50
              red: 80
            needle: true
          - type: gauge
            entity: sensor.system_monitor_ram_usage
            name: RAM
            severity:
              green: 0
              yellow: 60
              red: 85
            needle: true
          - type: gauge
            entity: sensor.system_monitor_swap_usage
            name: Swap
            severity:
              green: 0
              yellow: 50
              red: 80
            needle: true
          - type: gauge
            entity: sensor.system_monitor_disk_primary
            name: Disk
            severity:
              green: 0
              yellow: 70
              red: 90
            needle: true
      - type: history-graph
        title: CPU & RAM History
        hours_to_show: 2
        entities:
          - entity: sensor.system_monitor_cpu_usage
            name: CPU
          - entity: sensor.system_monitor_ram_usage
            name: RAM
      - type: horizontal-stack
        cards:
          - type: entities
            title: CPU
            show_header_toggle: false
            entities:
              - entity: sensor.system_monitor_cpu_usage
                name: Usage
              - entity: sensor.system_monitor_cpu_frequency
                name: Frequency
              - entity: sensor.system_monitor_load_1m
                name: Load 1m
          - type: entities
            title: Memory
            show_header_toggle: false
            entities:
              - entity: sensor.system_monitor_ram_usage
                name: RAM
              - entity: sensor.system_monitor_ram_used
                name: RAM Used
              - entity: sensor.system_monitor_swap_usage
                name: Swap
      - type: horizontal-stack
        cards:
          - type: entities
            title: Network
            show_header_toggle: false
            entities:
              - entity: sensor.system_monitor_net_sent
                name: Sent
              - entity: sensor.system_monitor_net_received
                name: Received
          - type: entities
            title: System
            show_header_toggle: false
            entities:
              - entity: sensor.system_monitor_uptime
                name: Uptime
              - entity: sensor.system_monitor_host_info
                name: Host
              - entity: sensor.system_monitor_top_processes
                name: Processes
      - type: history-graph
        title: Network Traffic
        hours_to_show: 2
        entities:
          - entity: sensor.system_monitor_net_sent
            name: Sent
          - entity: sensor.system_monitor_net_received
            name: Received
      - type: history-graph
        title: Disk Usage 24h
        hours_to_show: 24
        entities:
          - entity: sensor.system_monitor_disk_primary
            name: Root
