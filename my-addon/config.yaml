---
name: "System Monitor"
version: "2.0.0"
slug: "my-addon"
description: "Publishes real-time CPU, RAM, disk, temperature, and network metrics as native Home Assistant sensor entities. Use them on any HA dashboard with built-in gauge, history, and entity cards."
url: "https://github.com/fulfilsupplychain/homeassistant-addons/tree/main/my-addon"
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
homeassistant_api: true
hassio_api: true
map:
  - config:rw
options:
  refresh_interval: 5
  log_level: "info"
schema:
  refresh_interval: "int(1,60)"
  log_level: list(trace|debug|info|notice|warning|error|fatal)
