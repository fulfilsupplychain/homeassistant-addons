---
name: "System Monitor"
version: "2.0.0"
slug: "my-addon"
description: "Real-time CPU, RAM, disk, and temperature monitoring as native HA sensors."
url: "https://github.com/fulfilsupplychain/homeassistant-addons/tree/main/my-addon"
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
homeassistant_api: true
hassio_api: true
hassio_role: default
map:
  - config:rw
options:
  refresh_interval: 5
  log_level: "info"
schema:
  refresh_interval: "int(1,60)"
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
