arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
homeassistant_api: true
hassio_api: true
map:
  - config:rw
options:
  message: "Hello from My Addon!"
  log_level: "info"
schema:
  message: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
